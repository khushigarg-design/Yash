<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open My Letter</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ffeaf3);
overflow:hidden;
font-family:Arial, sans-serif;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d88;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* cursor hearts */

.cursor-heart{
position:absolute;
pointer-events:none;
color:#ff4d88;
font-size:18px;
animation:fade 1s forwards;
}

@keyframes fade{
0%{opacity:1; transform:scale(1);}
100%{opacity:0; transform:scale(2);}
}

/* envelope */

.container{
text-align:center;
z-index:10;
}

.envelope{
width:220px;
height:150px;
background:#ff7aa2;
position:relative;
border-radius:8px;
cursor:pointer;
}

.flap{
position:absolute;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:75px solid #ff4d88;
top:-75px;
transform-origin:bottom;
transition:0.6s;
}

.letter{
width:200px;
height:120px;
background:white;
position:absolute;
top:15px;
left:10px;
border-radius:6px;
padding:15px;
box-sizing:border-box;
transform:translateY(0);
transition:0.8s;
opacity:0;
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-120px);
opacity:1;
}

.message{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="envelope" onclick="openLetter()" id="env">

<div class="flap"></div>

<div class="letter">
<h3>Hello 💌</h3>
<p>
This little letter is just for you.<br>
Hope it makes you smile ❤️
</p>
</div>

</div>

<div class="message">Click the envelope</div>

</div>

<script>

/* open envelope */

function openLetter(){
document.getElementById("env").classList.toggle("open");
}

/* floating hearts */

function floatingHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(floatingHeart,500);

/* cursor hearts */

document.addEventListener("mousemove",function(e){

const heart=document.createElement("div");
heart.className="cursor-heart";
heart.innerHTML="❤";

heart.style.left=e.pageX+"px";
heart.style.top=e.pageY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

</script>

</body>
</html>
